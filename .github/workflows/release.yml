name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build macOS app
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Show Swift version
        run: xcrun swift --version

      - name: Test
        continue-on-error: true
        run: |
          set -o pipefail
          xcrun swift test 2>&1 | tee swift-test.log

      - name: Build app bundle
        run: |
          set -euxo pipefail

          APP_NAME="AgentBar"
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_DIR=".build/release"
          APP_DIR=".build/${APP_NAME}.app"
          CONTENTS_DIR="${APP_DIR}/Contents"
          MACOS_DIR="${CONTENTS_DIR}/MacOS"

          xcrun swift build -c release --product "${APP_NAME}"

          rm -rf "${APP_DIR}"
          mkdir -p "${MACOS_DIR}"
          cp "${BUILD_DIR}/${APP_NAME}" "${MACOS_DIR}/${APP_NAME}"

          cat > "${CONTENTS_DIR}/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>${APP_NAME}</string>
            <key>CFBundleIdentifier</key>
            <string>com.agentbar.app</string>
            <key>CFBundleName</key>
            <string>${APP_NAME}</string>
            <key>CFBundleDisplayName</key>
            <string>${APP_NAME}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleVersion</key>
            <string>${GITHUB_RUN_NUMBER}</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          plutil -lint "${CONTENTS_DIR}/Info.plist"
          test -x "${MACOS_DIR}/${APP_NAME}"

      - name: Package zip
        run: ditto -c -k --keepParent .build/AgentBar.app AgentBar-macos.zip

      - name: Package dmg
        run: |
          hdiutil create \
            -volname AgentBar \
            -srcfolder .build/AgentBar.app \
            -ov \
            -format UDZO \
            AgentBar-macos.dmg

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AgentBar-macos.zip
            AgentBar-macos.dmg
