name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: xcrun swift --version

      - name: Test
        run: |
          set -o pipefail
          xcrun swift test 2>&1 | tee swift-test.log
